name: "flow-poke-api-get-pikachu"

steps:
  - name: "get-all-pokemon"
    request:
      url: "https://pokeapi.co/api/v2/pokemon?offset=0&limit=1350"
      method: "GET"
      headers:
        accept: "application/json"
      body: null

    expect: null

    export:
      pokemonName: "results.0.name"

  - name: "get-pikachu"
    request:
      url: "https://pokeapi.co/api/v2/pokemon/${pokemonName}"
      method: "GET"
      headers:
        accept: "application/json"
      body:
        test: 1
        test2: 2

    expect:
      name: ${pokemonName}

    export: null