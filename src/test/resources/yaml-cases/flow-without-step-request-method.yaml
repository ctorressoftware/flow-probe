name: "flow-without-step-request-method"

# step request method is empty. If you remove the method property, application will reject the file, too.

steps:
  - name: "invalid-request-method"
    requires: null
    request:
      url: "https://pokeapi.co/api/v2/pokemon?offset=0&limit=1350"
      method:
      headers:
        accept: "application/json"
      body: null
    exports:
      pokemonName: "results.0.name"